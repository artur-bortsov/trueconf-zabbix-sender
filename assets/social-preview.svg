<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="stitle sdesc">
  <title id="stitle">TrueConf Zabbix Sender</title>
  <desc id="sdesc">Deliver Zabbix alerts straight into TrueConf chats. Python bridge with queue-first delivery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080f1f"/>
      <stop offset="100%" stop-color="#114894"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="52"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <ellipse cx="220"  cy="180" rx="420" ry="280" fill="#548aff" fill-opacity="0.26" filter="url(#blur)"/>
  <ellipse cx="1060" cy="460" rx="420" ry="280" fill="#42d9ff" fill-opacity="0.20" filter="url(#blur)"/>
  <ellipse cx="680"  cy="80"  rx="320" ry="200" fill="#9576ff" fill-opacity="0.12" filter="url(#blur)"/>
  <line x1="40" y1="420" x2="1240" y2="420" stroke="#42d9ff" stroke-opacity="0.12" stroke-width="1"/>
  <g font-family="Arial, Apple Symbols, sans-serif" text-anchor="middle">
    <rect x="496" y="105" width="288" height="40" rx="20" fill="#091223" fill-opacity="0.62" stroke="#42d9ff" stroke-opacity="0.45"/>
    <text x="640" y="131" fill="#c4d6ec" font-size="18" font-weight="700">Monitoring → ChatOps</text>
    <text x="640" y="244" fill="#f5f9ff" font-size="64" font-weight="800">TrueConf Zabbix</text>
    <text x="640" y="322" fill="#f5f9ff" font-size="64" font-weight="800">Sender</text>
    <text x="640" y="386" fill="#c4d6ec" font-size="28">Deliver Zabbix alerts straight into TrueConf chats.</text>
    <!-- Pills: total width 612 px, centred at x=640 -->
    <rect x="334" y="452" width="200" height="44" rx="22" fill="#091223" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="434"  y="480" fill="#f5f9ff" font-size="17" font-weight="700">Persistent queue</text>
    <rect x="554" y="452" width="212" height="44" rx="22" fill="#091223" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="660"  y="480" fill="#f5f9ff" font-size="17" font-weight="700">Email → ID mapping</text>
    <rect x="786" y="452" width="146" height="44" rx="22" fill="#091223" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="859"  y="480" fill="#f5f9ff" font-size="17" font-weight="700">Burst-ready</text>
    <text x="640" y="576" fill="#c4d6ec" font-size="16" fill-opacity="0.55">github.com/artur-bortsov/trueconf-zabbix-sender</text>
  </g>
</svg>
