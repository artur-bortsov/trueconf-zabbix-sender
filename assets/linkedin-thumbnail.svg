<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-labelledby="title desc">
  <title id="title">TrueConf Zabbix Sender LinkedIn thumbnail</title>
  <desc id="desc">A thumbnail showing Zabbix alerts flowing through a queue and mapping layer into TrueConf chats.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080f1f" />
      <stop offset="100%" stop-color="#114894" />
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="34" />
    </filter>
  </defs>
  <!-- Editable thumbnail source for LinkedIn/social sharing. -->
  <rect width="1200" height="627" fill="url(#bg)" />
  <ellipse cx="155" cy="110" rx="250" ry="170" fill="#548aff" fill-opacity="0.28" filter="url(#blur)" />
  <ellipse cx="978" cy="55" rx="190" ry="135" fill="#9576ff" fill-opacity="0.18" filter="url(#blur)" />
  <ellipse cx="1025" cy="540" rx="260" ry="205" fill="#42d9ff" fill-opacity="0.18" filter="url(#blur)" />
  <g opacity="0.12" stroke="#ffffff" stroke-width="1">
    <line x1="640" y1="70" x2="510" y2="560" />
    <line x1="695" y1="70" x2="565" y2="560" />
    <line x1="750" y1="70" x2="620" y2="560" />
    <line x1="805" y1="70" x2="675" y2="560" />
    <line x1="860" y1="70" x2="730" y2="560" />
    <line x1="915" y1="70" x2="785" y2="560" />
    <line x1="970" y1="70" x2="840" y2="560" />
    <line x1="1025" y1="70" x2="895" y2="560" />
    <line x1="1080" y1="70" x2="950" y2="560" />
    <line x1="1135" y1="70" x2="1005" y2="560" />
  </g>
  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <line x1="600" y1="120" x2="1150" y2="120" />
    <line x1="600" y1="178" x2="1150" y2="178" />
    <line x1="600" y1="236" x2="1150" y2="236" />
    <line x1="600" y1="294" x2="1150" y2="294" />
    <line x1="600" y1="352" x2="1150" y2="352" />
    <line x1="600" y1="410" x2="1150" y2="410" />
    <line x1="600" y1="468" x2="1150" y2="468" />
  </g>
  <g font-family="Inter, Arial, Helvetica, sans-serif">
    <rect x="72" y="68" width="248" height="40" rx="20" fill="#091223" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.28" />
    <text x="92" y="94" fill="#c4d6ec" font-size="19" font-weight="700">Monitoring → ChatOps</text>
    <text x="72" y="192" fill="#f5f9ff" font-size="74" font-weight="800">TrueConf</text>
    <text x="72" y="274" fill="#f5f9ff" font-size="74" font-weight="800">Zabbix</text>
    <text x="72" y="356" fill="#f5f9ff" font-size="74" font-weight="800">Sender</text>
    <rect x="72" y="388" width="156" height="8" rx="4" fill="#42d9ff" />
    <text x="72" y="458" fill="#f5f9ff" font-size="29" font-weight="600">Deliver Zabbix alerts straight</text>
    <text x="72" y="494" fill="#f5f9ff" font-size="29" font-weight="600">into TrueConf chats.</text>
    <text x="72" y="532" fill="#c4d6ec" font-size="20">Python bridge with queue-first delivery, email</text>
    <text x="72" y="558" fill="#c4d6ec" font-size="20">mapping, and service mode for reliable alert bursts.</text>
    <rect x="72" y="582" width="170" height="38" rx="18" fill="#091223" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.28" />
    <text x="157" y="607" text-anchor="middle" fill="#f5f9ff" font-size="18" font-weight="700">Persistent queue</text>
    <rect x="256" y="582" width="182" height="38" rx="18" fill="#091223" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.28" />
    <text x="347" y="607" text-anchor="middle" fill="#f5f9ff" font-size="18" font-weight="700">Email → ID mapping</text>
    <rect x="452" y="582" width="168" height="38" rx="18" fill="#091223" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.28" />
    <text x="536" y="607" text-anchor="middle" fill="#f5f9ff" font-size="18" font-weight="700">Burst-ready</text>
    <rect x="610" y="92" width="540" height="440" rx="32" fill="#081224" fill-opacity="0.84" stroke="#6991cd" stroke-opacity="0.36" />
    <text x="646" y="146" fill="#f5f9ff" font-size="28" font-weight="700">How it works</text>
    <text x="646" y="176" fill="#c4d6ec" font-size="17">One sender keeps monitoring notifications fast,</text>
    <text x="646" y="198" fill="#c4d6ec" font-size="17">direct, and resilient.</text>
    <g>
      <rect x="646" y="225" width="132" height="150" rx="24" fill="#0c182d" fill-opacity="0.92" stroke="#ffaa54" stroke-opacity="0.74" stroke-width="2" />
      <rect x="662" y="239" width="100" height="8" rx="4" fill="#ffaa54" />
      <circle cx="682" cy="257" r="10" fill="#ffaa54" fill-opacity="0.18" stroke="#ffaa54" />
      <text x="712" y="300" text-anchor="middle" fill="#f5f9ff" font-size="24" font-weight="700">Zabbix</text>
      <text x="712" y="336" text-anchor="middle" fill="#c4d6ec" font-size="17">Detects</text>
      <text x="712" y="358" text-anchor="middle" fill="#c4d6ec" font-size="17">problems</text>
    </g>
    <g>
      <rect x="814" y="225" width="132" height="150" rx="24" fill="#0c182d" fill-opacity="0.92" stroke="#42d9ff" stroke-opacity="0.74" stroke-width="2" />
      <rect x="830" y="239" width="100" height="8" rx="4" fill="#42d9ff" />
      <circle cx="850" cy="257" r="10" fill="#42d9ff" fill-opacity="0.18" stroke="#42d9ff" />
      <text x="880" y="300" text-anchor="middle" fill="#f5f9ff" font-size="24" font-weight="700">Queue</text>
      <text x="880" y="336" text-anchor="middle" fill="#c4d6ec" font-size="17">Maps emails</text>
      <text x="880" y="358" text-anchor="middle" fill="#c4d6ec" font-size="17">&amp; buffers bursts</text>
    </g>
    <g>
      <rect x="982" y="225" width="132" height="150" rx="24" fill="#0c182d" fill-opacity="0.92" stroke="#67a3ff" stroke-opacity="0.74" stroke-width="2" />
      <rect x="998" y="239" width="100" height="8" rx="4" fill="#67a3ff" />
      <circle cx="1018" cy="257" r="10" fill="#67a3ff" fill-opacity="0.18" stroke="#67a3ff" />
      <text x="1048" y="300" text-anchor="middle" fill="#f5f9ff" font-size="24" font-weight="700">TrueConf</text>
      <text x="1048" y="336" text-anchor="middle" fill="#c4d6ec" font-size="17">Sends direct</text>
      <text x="1048" y="358" text-anchor="middle" fill="#c4d6ec" font-size="17">chat alerts</text>
    </g>
    <g fill="none" stroke-linecap="round" stroke-width="6">
      <line x1="778" y1="300" x2="804" y2="300" stroke="#ffaa54" />
      <polygon points="804,300 790,292 790,308" fill="#ffaa54" stroke="none" />
      <line x1="946" y1="300" x2="972" y2="300" stroke="#42d9ff" />
      <polygon points="972,300 958,292 958,308" fill="#42d9ff" stroke="none" />
    </g>
    <text x="646" y="430" fill="#c4d6ec" font-size="18">Persistent service mode keeps one connection open</text>
    <text x="646" y="454" fill="#c4d6ec" font-size="18">while queued alerts are delivered in order.</text>
  </g>
</svg>
